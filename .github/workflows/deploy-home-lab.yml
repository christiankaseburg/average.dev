name: Deploy Home Lab

on:
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read
  packages: write

jobs:
  build-and-test:
    name: Build & Test on Build Pi
    runs-on: [self-hosted, pi-build-server]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0


      - name: Build React Web App (home-web)
        uses: ./.github/actions/build-web

      - name: Upload Web Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: home-web-dist
          path: dist/apps/home-web
          retention-days: 7

      - name: Build & Push Go API (home-api)
        uses: ./.github/actions/build-api
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          image_name: christiankaseburg/home-api

  deploy:
    name: Deploy to Hosting Pi
    needs: build-and-test
    runs-on: [self-hosted, pi-host-server]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4


      - name: Download Web Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: home-web-dist
          path: dist/apps/home-web

      - name: Update Static Web Files
        run: |
          echo "Clearing existing web assets..."
          rm -rf deploy/home/home-web-dist
          mkdir -p deploy/home/home-web-dist
          echo "Copying new build assets..."
          cp -r dist/apps/home-web/* deploy/home/home-web-dist/
          echo "Assets updated successfully."
        shell: bash

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull & Deploy Stack
        run: |
          cd deploy/home
          echo "Pulling latest docker images..."
          docker compose pull
          echo "Starting containers..."
          docker compose up -d --remove-orphans
          echo "Deployment completed successfully!"
        shell: bash
