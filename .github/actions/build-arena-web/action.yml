name: 'Build Arena Web'
description: 'Installs dependencies and builds the arena-web React/Phaser application'
runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'yarn'

    - name: Install Dependencies
      run: yarn install --frozen-lockfile
      shell: bash

    - name: Build Arena Web
      run: yarn nx build arena-web
      shell: bash
