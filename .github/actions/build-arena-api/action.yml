name: 'Build Arena API'
description: 'Builds the arena-api Docker image and pushes to GHCR'

inputs:
  registry:
    description: 'Docker registry'
    required: true
    default: 'ghcr.io'
  username:
    description: 'Registry username'
    required: true
  password:
    description: 'Registry password'
    required: true
  image_name:
    description: 'Target image name (e.g. christiankaseburg/arena-api)'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.registry }}
        username: ${{ inputs.username }}
        password: ${{ inputs.password }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./apps/arena-api/Dockerfile
        push: true
        tags: ${{ inputs.registry }}/${{ inputs.image_name }}:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
